name: Auto Update News

on:
  workflow_dispatch: # Để sếp bấm nút chạy tay cho sướng
  schedule:
    - cron: '0 * * * *' # Tự động mỗi tiếng chạy 1 lần

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi trực tiếp ở đây
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install feedparser beautifulsoup4 google-generativeai

      - name: Run Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python bot_rss.py

      - name: Commit and Push
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          git add .
          git commit -m "Update Intelligence Terminal [skip ci]" || exit 0
          git push
