name: Auto Update News

on:
  workflow_dispatch: # Để sếp bấm nút chạy tay khi cần
  schedule:
    - cron: '0 * * * *' # Tự động chạy vào đầu mỗi tiếng

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền để bot có thể push bài báo mới lên repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử để tránh lỗi khi push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 google-generativeai

      - name: Run Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python bot_rss.py

      - name: Commit and Push
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          git add .
          # Nếu không có gì thay đổi thì không báo lỗi
          git commit -m "Update Intelligence Terminal [skip ci]" || echo "No changes to commit"
          git push origin main
