name: Auto Update News

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests

      - name: Deep Clean Workspace
        # Dọn sạch rác để không bị trùng lặp file cũ
        run: |
          find . -maxdepth 1 -name "news-*.html" -delete || true
          rm -rf posts || true
          mkdir -p posts
          rm -f index.html || true

      - name: Run Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot_rss.py

      - name: Commit and Push
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          
          # 1. PHẢI ADD TRƯỚC: Hốt sạch thay đổi để không bị "unstaged changes"
          git add -A
          
          # 2. PULL SAU: Đồng bộ với server sau khi đã gom hàng
          git pull origin main --rebase || git rebase --skip
          
          # 3. COMMIT & PUSH
          git commit -m "BrokeNoMore Terminal: Data Refreshed [skip ci]" --allow-empty
          git push origin main
