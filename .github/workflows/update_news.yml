name: Auto Update News

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests

      - name: Deep Clean Workspace
        # Tự giác quét sạch rác ở cả root và folder posts trước khi chạy
        run: |
          find . -maxdepth 1 -name "news-*.html" -delete || true
          rm -rf posts || true
          mkdir -p posts
          rm -f index.html || true

      - name: Run Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot_rss.py

      - name: Commit and Force Push
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          
          # Hốt sạch mọi thay đổi (kể cả file sếp đã xóa tay)
          git add -A
          
          # Pull và ép rebase, nếu có xung đột thì ưu tiên bản mới nhất
          git pull origin main --rebase || git rebase --skip
          
          # Commit dù có thay đổi hay không để tránh lỗi kẹt script
          git commit -m "BrokeNoMore Terminal: Forced Update [skip ci]" --allow-empty
          
          # Đẩy hàng lên bản sạch nhất
          git push origin main
