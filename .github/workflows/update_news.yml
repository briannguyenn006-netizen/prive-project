name: Auto Update News

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests

      - name: Purge and Prepare
        # Bước này sẽ quét sạch đống file news rác sếp vừa phải xóa tay
        run: |
          # 1. Xóa sạch đống news-*.html cũ ở thư mục gốc (nếu còn)
          find . -maxdepth 1 -name "news-*.html" -type f -delete || true
          
          # 2. Xóa và tạo mới folder posts để đảm bảo không có file cũ
          rm -rf posts || true
          mkdir -p posts
          
          # 3. Xóa index cũ để build lại từ đầu
          rm -f index.html || true

      - name: Run Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot_rss.py

      - name: Commit and Push
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          
          # Tránh lỗi xung đột lịch sử
          git pull origin main --rebase
          
          git add .
          # Thêm [skip ci] để không bị lặp workflow
          git commit -m "BrokeNoMore Terminal: Data Refreshed [skip ci]" || echo "No changes"
          
          git push origin main
