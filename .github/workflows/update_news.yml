name: Auto Update Global News

on:
  schedule:
    - cron: '0 * * * *' # Cứ mỗi 1 tiếng nó tự chạy 1 lần
  workflow_dispatch: # Để sếp có nút "Chạy ngay đi" trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser beautifulsoup4 google-generativeai

      - name: Run Bot
        env:
          # Đây là chỗ mình lấy cái Key bảo mật
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} 
        run: python bot_rss.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update news from Bot" || exit 0
          git push
          