name: Auto Update News

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests

      - name: Purge and Prepare
        # Dọn sạch rác cũ để folder 'posts' luôn mới
        run: |
          find . -maxdepth 1 -name "news-*.html" -type f -delete || true
          rm -rf posts || true
          mkdir -p posts
          rm -f index.html || true

      - name: Run Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot_rss.py

      - name: Commit and Push
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          
          # 1. Add hết file mới vào trước để git không báo "unstaged changes"
          git add .
          
          # 2. Pull rebase để đồng bộ với server
          git pull origin main --rebase
          
          # 3. Commit và đẩy hàng
          git commit -m "BrokeNoMore Terminal: Data Refreshed [skip ci]" || echo "No changes"
          git push origin main
