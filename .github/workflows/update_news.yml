name: Auto Update News

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Quan trọng: Lấy sạch lịch sử để force push không bị chửi
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests

      - name: Run Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot_rss.py

      - name: Force Push Nuclear
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          
          # Không pull, không rebase gì hết. 
          # Cứ hốt hết những gì vừa chạy xong rồi đè lên server.
          git add -A
          git commit -m "BNM Terminal: Forced Update [skip ci]" || echo "No changes"
          
          # Dùng --force để đè bẹp mọi xung đột sếp vừa xóa tay
          git push origin main --force
