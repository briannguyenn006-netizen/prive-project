name: Auto Update News

on:
  workflow_dispatch: # Để sếp bấm nút chạy tay cho sướng
  schedule:
    - cron: '0 * * * *' # Tự động mỗi tiếng chạy 1 lần

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi trực tiếp để bot đăng bài
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy full lịch sử để git không bị ngáo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 google-generativeai

      - name: Run Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python bot_rss.py

      - name: Commit and Push
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          
          # CỰC KỲ QUAN TRỌNG: Kéo dữ liệu mới nhất về trước khi đẩy lên để tránh lỗi conflict
          git pull origin main --rebase
          
          git add .
          # Nếu không có file mới thì bỏ qua, có thì commit với tag [skip ci] để tránh lặp vô tận
          git commit -m "Update Intelligence Terminal [skip ci]" || echo "No changes to commit"
          
          git push origin main
