name: Auto Update News

on:
  workflow_dispatch: # Bấm nút chạy tay
  schedule:
    - cron: '0 * * * *' # Chạy tự động mỗi tiếng

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Cài requests để gọi Groq, bỏ cái google-generativeai cũ cho nhẹ
          pip install feedparser beautifulsoup4 requests

      - name: Run Script
        env:
          # ĐỔI TÊN BIẾN Ở ĐÂY CHO KHỚP VỚI SECRET SẾP VỪA TẠO
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot_rss.py

      - name: Commit and Push
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          
          # Tránh lỗi xung đột lịch sử
          git pull origin main --rebase
          
          git add .
          git commit -m "Update Terminal with Groq Engine [skip ci]" || echo "No changes to commit"
          
          # Đẩy lên bản sạch nhất
          git push origin main
