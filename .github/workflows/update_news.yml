name: Auto Update News

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests

      - name: Run Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot_rss.py

      - name: Force Push Changes
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          
          # Add sạch sẽ mọi thứ vừa tạo ra
          git add -A
          
          # Commit cưỡng chế
          git commit -m "BrokeNoMore Terminal: Nuclear Update [skip ci]" --allow-empty
          
          # ÉP BUỘC GITHUB NHẬN HÀNG - CHẤP CẢ XUNG ĐỘT
          git push origin main --force
