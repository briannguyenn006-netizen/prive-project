name: Auto Update News

on:
  workflow_dispatch: # Bấm nút chạy tay cho sướng
  schedule:
    - cron: '*/30 * * * *' # Chạy tự động mỗi 30 phút để bào tiền cho đều

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests

      - name: Clean Old Posts # Bước này để dọn rác cho web sạch sẽ
        run: |
          rm -rf posts/*.html
          rm -f index.html
          mkdir -p posts

      - name: Run Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot_rss.py

      - name: Commit and Push
        run: |
          git config --global user.name "BrokeNoMore Bot"
          git config --global user.email "bot@brokenomore.com"
          
          # Thủ thuật tránh lỗi xung đột khi chạy tần suất cao
          git pull origin main --rebase
          
          git add .
          git commit -m "Bào sàn - Cập nhật dữ liệu mới [skip ci]" || echo "No changes to commit"
          
          git push origin main
