<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Storage - Access Granted</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Toàn bộ body bây giờ là con trỏ click */
        body { cursor: pointer; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="handleGlobalClick()" class="bg-[#f8f9fa] text-gray-800 font-sans">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" />
                </svg>
            </div>
            <span class="text-xl font-bold text-gray-700 tracking-tight">CloudSpace <span class="text-blue-600">Pro</span></span>
        </div>
        <div>
            <span class="text-[10px] bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold border border-blue-100 uppercase">Secure Access</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 sm:p-10">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-extrabold text-gray-900 leading-none tracking-tight">Shared Drive</h2>
                <p class="text-sm text-gray-500 mt-2 italic font-medium">6 private files shared with you</p>
            </div>
            <p class="text-[10px] text-red-500 font-bold animate-pulse">EXPIRING SOON</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden mb-6">
            <div class="grid grid-cols-12 bg-gray-50 p-4 text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] border-b">
                <div class="col-span-8 sm:col-span-7 pl-2">Name</div>
                <div class="hidden sm:block col-span-3 text-center">Status</div>
                <div class="col-span-4 sm:col-span-2 text-right pr-2">Size</div>
            </div>

            <div class="divide-y divide-gray-50">
                <div class="grid grid-cols-12 p-5 items-center hover:bg-blue-50 transition">
                    <div class="col-span-8 sm:col-span-7 flex items-center">
                        <svg class="w-8 h-8 text-blue-500 mr-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
                        <div class="truncate italic font-bold text-blue-600 text-sm sm:text-base">CLIP_HOT_XEM_NHANH_KE_O_XOA.mp4</div>
                    </div>
                    <div class="hidden sm:block col-span-3 text-center text-[10px] text-green-600 font-black uppercase tracking-tighter">Ready</div>
                    <div class="col-span-4 sm:col-span-2 text-right text-sm font-semibold text-gray-400">42.8 MB</div>
                </div>
                <div class="grid grid-cols-12 p-5 items-center hover:bg-blue-50 transition">
                    <div class="col-span-8 sm:col-span-7 flex items-center">
                        <svg class="w-8 h-8 text-blue-500 mr-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
                        <div class="truncate italic font-bold text-blue-600 text-sm sm:text-base">FULL_ALBUM_ANH_GIAU_KIN.zip</div>
                    </div>
                    <div class="hidden sm:block col-span-3 text-center text-[10px] text-green-600 font-black uppercase tracking-tighter">Ready</div>
                    <div class="col-span-4 sm:col-span-2 text-right text-sm font-semibold text-gray-400">156 MB</div>
                </div>
                </div>
        </div>

        <div id="loadingZone" class="text-center p-6 border-2 border-dashed border-gray-200 rounded-2xl bg-white shadow-inner">
            <p id="msg" class="text-gray-400 font-bold text-[10px] uppercase tracking-widest">Tap anywhere to request access</p>
        </div>
    </main>

    <script>
        function handleGlobalClick() {
            const msg = document.getElementById('msg');
            msg.innerHTML = '<div class="loader"></div> <span class="ml-2 text-blue-600 font-bold uppercase text-[10px] tracking-widest">Redirecting to Secure Server...</span>';
            
            // CHỖ NÀY: DÁN SMARTLINK CỦA SẾP VÀO
            const smartlink = "https://www.google.com"; 
            
            // Delay 0.5s cho nó mượt rồi nhảy Ads
            setTimeout(() => {
                window.open(smartlink, "_blank");
                msg.innerHTML = '<span class="text-green-600 font-black uppercase text-xs">✅ Redirecting...</span>';
            }, 500);
        }
    </script>
</body>
</html>
